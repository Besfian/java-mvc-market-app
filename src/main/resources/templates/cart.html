<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMarket - Корзина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #f0f0f0;
        }

        .cart-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .cart-title {
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
        }

        .cart-empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .cart-empty h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .cart-empty p {
            color: #666;
            margin-bottom: 30px;
        }

        .shop-now-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .shop-now-btn:hover {
            transform: translateY(-2px);
        }

        .cart-items {
            list-style: none;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            gap: 20px;
            flex-wrap: wrap;
        }

        .item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .item-info {
            flex: 2;
            min-width: 150px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .item-price {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            padding: 5px;
        }

        .quantity-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .quantity-btn:hover {
            background: #5a67d8;
        }

        .quantity-value {
            font-size: 16px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .item-total {
            font-weight: bold;
            font-size: 18px;
            color: #333;
            min-width: 100px;
            text-align: right;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #ff3838;
            transform: none;
        }

        .cart-summary {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            text-align: right;
        }

        .total-row {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .total-label {
            color: #666;
        }

        .total-amount {
            color: #667eea;
            margin-left: 15px;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
        }

        .clear-cart {
            background: #6c757d;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
            .item-total {
                text-align: center;
            }
            .cart-summary {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/items" class="logo">🛒 MyMarket</a>
        <a href="/items" class="back-link">← Продолжить покупки</a>
    </div>

    <div class="cart-container">
        <div class="cart-title">🛍️ Ваша корзина</div>

        <div th:if="${items == null or items.empty}" class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <h2>Корзина пуста</h2>
            <p>Добавьте товары в корзину, чтобы оформить заказ</p>
            <a href="/items" class="shop-now-btn">Начать покупки</a>
        </div>

        <div th:unless="${items == null or items.empty}">
            <ul class="cart-items">
                <li th:each="item : ${items}" class="cart-item">
                    <img th:if="${item.imgPath}" th:src="${item.imgPath}" alt="Product" class="item-img">
                    <div th:unless="${item.imgPath}" class="item-img" style="display: flex; align-items: center; justify-content: center;">
                        📦
                    </div>

                    <div class="item-info">
                        <div class="item-title" th:text="${item.title}">Название</div>
                        <div class="item-price">
                            <span th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}">0</span> ₽ / шт
                        </div>
                    </div>

                    <div class="item-actions">
                        <form method="post" action="/cart/items" style="display: flex; gap: 10px; align-items: center;">
                            <input type="hidden" name="id" th:value="${item.id}">
                            <div class="quantity-controls">
                                <button type="submit" name="action" value="MINUS" class="quantity-btn">-</button>
                                <span class="quantity-value" th:text="${item.count}">0</span>
                                <button type="submit" name="action" value="PLUS" class="quantity-btn">+</button>
                            </div>
                            <button type="submit" name="action" value="DELETE" class="delete-btn">Удалить</button>
                        </form>

                        <div class="item-total">
                            <span th:text="${#numbers.formatInteger(item.price * item.count, 0, 'COMMA')}">0</span> ₽
                        </div>
                    </div>
                </li>
            </ul>

            <div class="cart-summary">
                <div class="total-row">
                    <span class="total-label">Итого:</span>
                    <span class="total-amount" th:text="${#numbers.formatInteger(total, 0, 'COMMA')}">0</span> ₽
                </div>

                <form method="post" action="/buy">
                    <button type="button" class="clear-cart" onclick="clearCart()" style="background: #6c757d;">Очистить корзину</button>
                    <button type="submit" class="checkout-btn">✅ Оформить заказ</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
        function clearCart() {
            if (confirm('Вы уверены, что хотите очистить корзину?')) {
                fetch('/cart/clear', { method: 'POST' })
                    .then(() => window.location.reload());
            }
        }
    </script>
</body>
</html>
