<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.title} + ' - MyMarket'">Товар - MyMarket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 15px;
        }
        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .nav-link:hover {
            background: #f0f0f0;
        }
        .product-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .product-gallery {
            background: #f8f9fa;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        .product-img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        .product-info {
            padding: 40px 40px 40px 0;
        }
        .product-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .product-price {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        .product-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .quantity-section {
            margin-bottom: 30px;
        }
        .quantity-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .quantity-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .quantity-btn:hover {
            background: #5a67d8;
        }
        .quantity-value {
            font-size: 20px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }
        .cart-summary {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .cart-summary span {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
            display: inline-block;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-secondary {
            background: #28a745;
            color: white;
            flex: 1;
            text-align: center;
        }
        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            .product-info {
                padding: 0 20px 30px 20px;
            }
            .product-gallery {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/items" class="logo">🛒 MyMarket</a>
        <div class="nav-links">
            <a href="/cart/items" class="nav-link">🛍️ Корзина</a>
            <a href="/orders" class="nav-link">📋 Заказы</a>
        </div>
    </div>

    <div class="product-container">
        <div class="product-gallery">
            <img th:if="${item.imgPath}" th:src="${item.imgPath}" alt="Product" class="product-img">
            <div th:unless="${item.imgPath}" class="product-img" style="font-size: 100px;">📦</div>
        </div>

        <div class="product-info">
            <h1 class="product-title" th:text="${item.title}">Название товара</h1>
            <div class="product-price">
                <span th:text="${item.price}"></span> ₽
            </div>
            <div class="product-description" th:text="${item.description}">
                Описание товара будет здесь.
            </div>

            <div class="quantity-section">
                <div class="quantity-label">Количество в корзине:</div>
                <div class="quantity-controls">
                    <!-- Кнопка МИНУС - action в QUERY PARAMETER -->
                    <form method="post" th:action="@{/items/{id}(id=${item.id}, action='MINUS')}" style="display: inline;">
                        <button type="submit" class="quantity-btn">-</button>
                    </form>
                    <span class="quantity-value" th:text="${item.count}">0</span>
                    <!-- Кнопка ПЛЮС - action в QUERY PARAMETER -->
                    <form method="post" th:action="@{/items/{id}(id=${item.id}, action='PLUS')}" style="display: inline;">
                        <button type="submit" class="quantity-btn">+</button>
                    </form>
                </div>
            </div>

            <div class="cart-summary" th:if="${item.count > 0}">
                📦 В корзине: <span th:text="${item.count}">0</span> шт.
                <br>
                💰 На сумму: <span th:text="${item.price * item.count}"></span> ₽
            </div>

            <div class="action-buttons">
                <a href="/cart/items" class="btn btn-secondary">🛒 Перейти в корзину</a>
                <a href="/items" class="btn btn-outline">← Назад к товарам</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
